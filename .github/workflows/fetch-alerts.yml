name: automated alert scam

on:
  schedule:
    - cron: '0 */12 * * *' # Still runs every 12 hours
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Only need permission to push code

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch latest scam alerts
        run: node "rss feed/fetch-alerts.js"

      - name: Commit & push alerts.json
        run: |
          git config user.name "PROOF Alert Bot"
          git config user.email "alerts-bot@users.noreply.github.com"
          git add "rss feed/alerts.json"
          if git diff --cached --quiet; then
            echo "No new alerts."
          else
            git commit -m "chore: refresh scam alerts"
            git push
          fi
