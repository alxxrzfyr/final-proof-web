name: Automated Scam Alert Fetch

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest scam alerts
        run: node "rss feed/fetch-alerts.js"

      - name: Commit & push alerts.json
        run: |
          git config user.name "PROOF Alert Bot"
          git config user.email "alerts-bot@users.noreply.github.com"
          git add "rss feed/alerts.json"
          if git diff --cached --quiet; then
            echo "No new alerts. Skipping commit."
          else
            git commit -m "chore: refresh scam alerts"
            git push origin main
            
            # This sends the signal to Vercel to rebuild your site
            curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
          fi
